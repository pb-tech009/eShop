apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eshop-app
  namespace: argocd
spec:
  project: eshop-project
  source:
    repoURL: https://github.com/pb-tech009/eShop.git
    targetRevision: main
    path: helm/eshop
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: "global.domain"
          value: "${external_dns}"
  destination:
    server: https://kubernetes.default.svc
    namespace: eshop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true 
